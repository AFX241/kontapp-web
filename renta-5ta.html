<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Renta 5ta 2026 | KontApp</title>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#f5f7fb;
padding:40px;
max-width:800px;
margin:auto;
}

h1{
color:#0b57d0;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#0b57d0;
color:white;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.resultado{
margin-top:25px;
padding:20px;
background:#eef4ff;
border-radius:10px;
font-size:18px;
line-height:2;
color:#0b57d0;
}
  
</style>
</head>

<body>

<h1>Calculadora de Renta de 5ta Categoría 2026</h1>

<div class="card">

<label>Sueldo Mensual (S/)</label>
<input type="number" id="sueldo">

<button onclick="calcular()">
Calcular
</button>

<div class="resultado" id="resultado"></div>

<a href="/"
style="
display:inline-block;
padding:12px 20px;
background:#0b57d0;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;">
🏠 Volver a KontApp
</a>  

</div>

<script>

function calcular(){

const sueldo =
parseFloat(document.getElementById("sueldo").value);

if(!sueldo){
return;
}

const UIT = 5500;

const gratificaciones = sueldo * 2;

const bonificacionExtra =
gratificaciones * 0.09;

const ingresoAnual =
(sueldo * 12) +
gratificaciones +
bonificacionExtra;

const deduccion7UIT = UIT * 7;

const rentaImponible =
Math.max(0, ingresoAnual - deduccion7UIT);

let impuesto = 0;

if(rentaImponible <= 5 * UIT){

impuesto = rentaImponible * 0.08;

}else{

const tramo1 = 5 * UIT;
const exceso = rentaImponible - tramo1;

impuesto = (tramo1 * 0.08) +
(exceso * 0.14);

}

const retencionMensual =
impuesto / 12;

document.getElementById("resultado").innerHTML =

"<strong>Ingreso anual:</strong> S/ " +
ingresoAnual.toLocaleString() +

"<br><strong>Deducción 7 UIT:</strong> S/ " +
deduccion7UIT.toLocaleString() +

"<br><strong>Renta imponible:</strong> S/ " +
rentaImponible.toLocaleString() +

"<br><strong>Impuesto anual proyectado:</strong> S/ " +
impuesto.toFixed(2) +

"<br><strong>Retención mensual estimada:</strong> S/ " +
retencionMensual.toFixed(2);

}

</script>

</body>
</html>
