<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Renta 5ta 2026 | KontApp</title>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#f5f7fb;
padding:40px;
max-width:800px;
margin:auto;
box-sizing:border-box;  
}

h1{
color:#0b57d0;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

input[type="number"]{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

input[type="checkbox"]{
width:auto;
margin-right:10px;
transform:scale(1.2);
}

select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}  

button{
background:#0b57d0;
color:white;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.resultado{
margin-top:25px;
padding:20px;
background:#eef4ff;
border-radius:10px;
font-size:18px;
line-height:2;
color:#0b57d0;
}

.botones{
display:flex;
gap:10px;
margin-top:15px;
}

.botones button{
flex:1;
}

.btn-limpiar{
background:#6c757d;
}

.btn-limpiar:hover{
background:#5a6268;
}  
  
</style>
</head>

<body>

<h1>Calculadora de Renta de 5ta Categoría 2026</h1>

<div class="card">

<label>Sueldo Mensual (S/)</label>
<input type="number" id="sueldo">

<div style="margin:15px 0;">

<label style="display:flex;align-items:center;gap:10px;cursor:pointer;">

<input
type="checkbox"
id="af"
style="width:auto;margin:0;">

<span>Tiene Asignación Familiar (S/ 113)</span>

</label>

</div>

<label>Régimen de Salud</label>

<select id="salud">
    <option value="0.09">EsSalud (9%)</option>
    <option value="0.0675">EPS (6.75%)</option>
</select>

<label>Horas Extras Promedio Mensual</label>
<input type="number" id="hextras" value="0">

<label>Comisiones Promedio Mensual</label>
<input type="number" id="comisiones" value="0">

<label>Bonos Mensuales</label>
<input type="number" id="bonos" value="0">

<label>Mes de cálculo</label>
<select id="mes">
    <option value="1">Enero</option>
    <option value="2">Febrero</option>
    <option value="3">Marzo</option>
    <option value="4">Abril</option>
    <option value="5">Mayo</option>
    <option value="6">Junio</option>
    <option value="7">Julio</option>
    <option value="8">Agosto</option>
    <option value="9">Septiembre</option>
    <option value="10">Octubre</option>
    <option value="11">Noviembre</option>
    <option value="12">Diciembre</option>
</select>

<div class="botones">

<button onclick="calcular()">
Calcular Quinta Categoría
</button>

<button class="btn-limpiar" onclick="limpiar()">
Limpiar
</button>

</div>

<div id="resultado" class="resultado"></div>

<div id="leadForm" style="
display:none;
margin-top:25px;
padding:20px;
background:#ffffff;
border:1px solid #ddd;
border-radius:10px;
">

<h3>¿Necesitas ayuda con SUNAT o Contabilidad?</h3>

<p>
Déjanos tus datos y te contactaremos sin costo.
</p>

<input
type="text"
placeholder="Nombre"
id="nombreLead">

<input
type="email"
placeholder="Correo"
id="correoLead">

<input
type="text"
placeholder="WhatsApp"
id="telefonoLead">

<select id="interes">
<option>Declaración de Renta</option>
<option>Planillas</option>
<option>SIRE</option>
<option>Contabilidad Mensual</option>
<option>Asesoría Tributaria</option>
</select>

<button onclick="contactar()" style=" width:100%; background:#0b57d0; color:white; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px;"> Solicitar Asesoría Gratuita </button>

</div>

<a href="/"
style="
display:inline-block;
padding:12px 20px;
background:#0b57d0;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;">
🏠 Volver a KontApp
</a>  

</div>

<script>

function calcular(){

const sueldo = parseFloat(document.getElementById("sueldo").value) || 0;

const tieneAF =
document.getElementById("af").checked;

const salud =
parseFloat(document.getElementById("salud").value);

const hextras =
parseFloat(document.getElementById("hextras").value) || 0;

const comisiones =
parseFloat(document.getElementById("comisiones").value) || 0;

const bonos =
parseFloat(document.getElementById("bonos").value) || 0;

const mes =
parseInt(document.getElementById("mes").value);

const UIT = 5500;

const af = tieneAF ? 113 : 0;

const remuneracion =
sueldo + af + hextras + comisiones + bonos;

const gratificaciones =
remuneracion * 2;

const bonificacionExtra =
gratificaciones * salud;

const ingresoAnual =
(remuneracion * 12) +
gratificaciones +
bonificacionExtra;

const deduccion7UIT =
UIT * 7;

const rentaImponible =
Math.max(
0,
ingresoAnual - deduccion7UIT
);

let impuesto = 0;
let restante = rentaImponible;

// Hasta 5 UIT = 8%
let tramo =
Math.min(restante, UIT * 5);

impuesto += tramo * 0.08;
restante -= tramo;

// Hasta 20 UIT = 14%
if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.14;
restante -= tramo;
}

// Hasta 35 UIT = 17%
if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.17;
restante -= tramo;
}

// Hasta 45 UIT = 20%
if(restante > 0){
tramo = Math.min(restante, UIT * 10);
impuesto += tramo * 0.20;
restante -= tramo;
}

// Más de 45 UIT = 30%
if(restante > 0){
impuesto += restante * 0.30;
}

const mesesPendientes =
13 - mes;

const retencionMensual =
mesesPendientes > 0
? impuesto / mesesPendientes
: impuesto;

document.getElementById("resultado").innerHTML =

"<strong>Remuneración Computable:</strong> S/ " +
remuneracion.toLocaleString() +

"<br><strong>Gratificaciones:</strong> S/ " +
gratificaciones.toLocaleString() +

"<br><strong>Bonificación Extraordinaria:</strong> S/ " +
bonificacionExtra.toFixed(2) +

"<br><strong>Ingreso Anual Proyectado:</strong> S/ " +
ingresoAnual.toLocaleString() +

"<hr>" +

"<strong>7 UIT Deducibles:</strong> S/ " +
deduccion7UIT.toLocaleString() +

"<br><strong>Renta Imponible:</strong> S/ " +
rentaImponible.toLocaleString() +

"<br><strong>Impuesto Anual:</strong> S/ " +
impuesto.toFixed(2) +

"<br><strong>Mes de Cálculo:</strong> " +
mes +

"<br><strong>Meses Pendientes:</strong> " +
mesesPendientes +

"<br><strong>Retención Mensual Estimada:</strong> S/ " +
retencionMensual.toFixed(2);

document.getElementById("leadForm").style.display = "block";  

}

function limpiar(){

document.getElementById("sueldo").value = "";
document.getElementById("af").checked = false;
document.getElementById("salud").value = "0.09";
document.getElementById("hextras").value = "0";
document.getElementById("comisiones").value = "0";
document.getElementById("bonos").value = "0";
document.getElementById("mes").value = "1";

document.getElementById("resultado").innerHTML = "";

}

function contactar(){

const nombre =
document.getElementById("nombreLead").value;

const correo =
document.getElementById("correoLead").value;

const telefono =
document.getElementById("telefonoLead").value;

const interes =
document.getElementById("interes").value;

const mensaje =
`Hola, soy ${nombre}.

He utilizado la Calculadora de Quinta Categoría de KontApp.

Estoy interesado en:

${interes}`;

if(telefono.trim() !== ""){

window.open(
`https://wa.me/51960621456?text=${encodeURIComponent(mensaje)}`,
"_blank"
);

return;

}

if(correo.trim() !== ""){

window.location.href =
`mailto:contacto@kontapp.pe?subject=Consulta desde KontApp&body=${encodeURIComponent(mensaje)}`;

return;

}

alert(
"Ingrese un correo o un número de WhatsApp."
);

}
 
</script>

</body>
</html>
