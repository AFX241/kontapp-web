<body>

<h1>Calculadora de Renta de 5ta Categoría 2026</h1>

<div class="card">

<label>Sueldo Mensual (S/)</label>
<input type="number" id="sueldo">

<button onclick="calcular()">
Calcular
</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function calcular(){

const sueldo =
parseFloat(document.getElementById("sueldo").value);

if(!sueldo){
return;
}

const anual = sueldo * 14;

const deduccion = 38500;

const rentaNeta =
Math.max(0, anual - deduccion);

document.getElementById("resultado").innerHTML =
"Ingreso anual: S/ " +
anual.toLocaleString() +
"<br>Renta neta proyectada: S/ " +
rentaNeta.toLocaleString();

}

</script>

</body>
