<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Renta 5ta 2026 | KontApp</title>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#f5f7fb;
padding:40px;
max-width:800px;
margin:auto;
}

h1{
color:#0b57d0;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#0b57d0;
color:white;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.resultado{
margin-top:25px;
padding:20px;
background:#eef4ff;
border-radius:10px;
font-size:18px;
line-height:2;
color:#0b57d0;
}
  
</style>
</head>

<body>

<h1>Calculadora de Renta de 5ta Categoría 2026</h1>

<div class="card">

<label>Sueldo Mensual (S/)</label>
<input type="number" id="sueldo">

<button onclick="calcular()">
Calcular
</button>

<div class="resultado" id="resultado"></div>

<a href="/"
style="
display:inline-block;
padding:12px 20px;
background:#0b57d0;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;">
🏠 Volver a KontApp
</a>  

</div>

<script>

function calcular(){

const sueldo = parseFloat(document.getElementById("sueldo").value);

if(!sueldo){
alert("Ingrese un sueldo");
return;
}

const UIT = 5500;

const gratificaciones = sueldo * 2;
const bonificacionExtra = gratificaciones * 0.09;

const ingresoAnual =
(sueldo * 12) +
gratificaciones +
bonificacionExtra;

const deduccion7UIT = UIT * 7;

const rentaImponible =
Math.max(0, ingresoAnual - deduccion7UIT);

let impuesto = 0;
let restante = rentaImponible;

// Primer tramo: 5 UIT al 8%
let tramo = Math.min(restante, UIT * 5);
impuesto += tramo * 0.08;
restante -= tramo;

// Segundo tramo: 15 UIT al 14%
if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.14;
restante -= tramo;
}

// Tercer tramo: 15 UIT al 17%
if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.17;
restante -= tramo;
}

// Cuarto tramo: 10 UIT al 20%
if(restante > 0){
tramo = Math.min(restante, UIT * 10);
impuesto += tramo * 0.20;
restante -= tramo;
}

// Quinto tramo: exceso al 30%
if(restante > 0){
impuesto += restante * 0.30;
}

const retencionMensual = impuesto / 12;

document.getElementById("resultado").innerHTML =

"<strong>12 Sueldos:</strong> S/ " +
(sueldo * 12).toLocaleString() +

"<br><strong>Gratificaciones:</strong> S/ " +
gratificaciones.toLocaleString() +

"<br><strong>Bonificación Extraordinaria:</strong> S/ " +
bonificacionExtra.toFixed(2) +

"<br><strong>Ingreso Anual:</strong> S/ " +
ingresoAnual.toLocaleString() +

"<br><br><strong>7 UIT Deducibles:</strong> S/ " +
deduccion7UIT.toLocaleString() +

"<br><strong>Renta Imponible:</strong> S/ " +
rentaImponible.toLocaleString() +

"<br><strong>Impuesto Anual de 5ta:</strong> S/ " +
impuesto.toFixed(2) +

"<br><strong>Retención Mensual Estimada:</strong> S/ " +
retencionMensual.toFixed(2);

}

</script>

</body>
</html>
