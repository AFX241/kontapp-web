<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Renta 5ta 2026 | KontApp</title>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#f5f7fb;
padding:40px;
max-width:800px;
margin:auto;
box-sizing:border-box;  
}

h1{
color:#0b57d0;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

input[type="number"]{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

input[type="checkbox"]{
width:auto;
margin-right:10px;
transform:scale(1.2);
}

select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}  

button{
background:#0b57d0;
color:white;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.resultado{
margin-top:25px;
padding:20px;
background:#eef4ff;
border-radius:10px;
font-size:18px;
line-height:2;
color:#0b57d0;
}
  
</style>
</head>

<body>

<h1>Calculadora de Renta de 5ta Categoría 2026</h1>

<div class="card">

<label>Sueldo Mensual (S/)</label>
<input type="number" id="sueldo">

<div style="margin:15px 0;">

<label style="display:flex;align-items:center;gap:10px;cursor:pointer;">

<input
type="checkbox"
id="af"
style="width:auto;margin:0;">

<span>Tiene Asignación Familiar (S/ 113)</span>

</label>

</div>

<label>Régimen de Salud</label>

<select id="salud">
    <option value="0.09">EsSalud (9%)</option>
    <option value="0.0675">EPS (6.75%)</option>
</select>

<label>Horas Extras Promedio Mensual</label>
<input type="number" id="hextras" value="0">

<label>Comisiones Promedio Mensual</label>
<input type="number" id="comisiones" value="0">

<label>Bonos Mensuales</label>
<input type="number" id="bonos" value="0">

<label>Mes de cálculo</label>
<select id="mes">
    <option value="1">Enero</option>
    <option value="2">Febrero</option>
    <option value="3">Marzo</option>
    <option value="4">Abril</option>
    <option value="5">Mayo</option>
    <option value="6">Junio</option>
    <option value="7">Julio</option>
    <option value="8">Agosto</option>
    <option value="9">Septiembre</option>
    <option value="10">Octubre</option>
    <option value="11">Noviembre</option>
    <option value="12">Diciembre</option>
</select>

<button onclick="calcular()">
Calcular Quinta Categoría
</button>

<div id="resultado" class="resultado"></div>

<a href="/"
style="
display:inline-block;
padding:12px 20px;
background:#0b57d0;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;">
🏠 Volver a KontApp
</a>  

</div>

<script>

function calcular(){

const sueldo =
parseFloat(document.getElementById("sueldo").value) || 0;

const tieneAF =
document.getElementById("af").checked;

const salud =
parseFloat(document.getElementById("salud").value);

const hextras =
parseFloat(document.getElementById("hextras").value) || 0;

const comisiones =
parseFloat(document.getElementById("comisiones").value) || 0;

const bonos =
parseFloat(document.getElementById("bonos").value) || 0;

const UIT = 5500;

const af = tieneAF ? 113 : 0;

const remuneracion =
sueldo + af + hextras + comisiones + bonos;

const gratificaciones =
remuneracion * 2;

const bonificacionExtra =
gratificaciones * salud;

const ingresoAnual =
(remuneracion * 12) +
gratificaciones +
bonificacionExtra;

const deduccion7UIT =
UIT * 7;

const rentaImponible =
Math.max(
0,
ingresoAnual - deduccion7UIT
);

let impuesto = 0;
let restante = rentaImponible;

let tramo =
Math.min(restante, UIT * 5);

impuesto += tramo * 0.08;
restante -= tramo;

if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.14;
restante -= tramo;
}

if(restante > 0){
tramo = Math.min(restante, UIT * 15);
impuesto += tramo * 0.17;
restante -= tramo;
}

if(restante > 0){
tramo = Math.min(restante, UIT * 10);
impuesto += tramo * 0.20;
restante -= tramo;
}

if(restante > 0){
impuesto += restante * 0.30;
}

const retencionMensual =
impuesto / 12;

document.getElementById("resultado").innerHTML = `

<strong>Remuneración Computable:</strong>
S/ ${remuneracion.toLocaleString()}

<br><strong>Gratificaciones:</strong>
S/ ${gratificaciones.toLocaleString()}

<br><strong>Bonificación Extraordinaria:</strong>
S/ ${bonificacionExtra.toFixed(2)}

<br><strong>Ingreso Anual Proyectado:</strong>
S/ ${ingresoAnual.toLocaleString()}

<hr>

<strong>7 UIT Deducibles:</strong>
S/ ${deduccion7UIT.toLocaleString()}

<br><strong>Renta Imponible:</strong>
S/ ${rentaImponible.toLocaleString()}

<br><strong>Impuesto Anual de 5ta:</strong>
S/ ${impuesto.toFixed(2)}

<br><strong>Retención Mensual Estimada:</strong>
S/ ${retencionMensual.toFixed(2)}

`;
}

</script>

</body>
</html>
